<script>
class ajax {
	/** Object network id. */
	#id;
	set id(id) { this.#id = id; this.on_id_change(id); }
	get id() { return this.#id; }
		
	/** Send array of args. Example: send([1, "test", "hello"]); */
	send(args)
	{
		if (this.#id == undefined)
			return;
		
		/** Example of generated request: /?id=0&a1=1&a2=test&a3=hello. */
		var request = "/?id=" + encodeURIComponent(this.#id);
		for (var i = 0; i < args.length; i++) {
			request += "&a" + (i + 1) + "="
				+ encodeURIComponent(args[i]);
		}
		
		/** Log URI if we're running this page standalone. */
		if(window.location.protocol == 'file:') {
			console.log("send|    " + request);
			return;
		}
		
		/** Create XMLHTTP request. */
		const xhttp = new XMLHttpRequest();
		xhttp.sender = this;
		
		/** What to do on response. */
		xhttp.onload = function()
		{
			if (this.responseText.length <= 0)
				return;

			var args;

			console.log("recv|    " + request);
			try {
				args = JSON.parse(this.responseText);
			} catch (e) {
				args = [];
			}

			xhttp.sender.on_recv(args);
		}

		xhttp.open("GET", request, true);
		xhttp.send();
	}
	
	/** Auto send interval. */
	#interval = 0;
	#interval_timer;
	
	set interval(value)
	{
		this.#interval = value;
		clearInterval(this.#interval_timer);
		if (value <= 0) return;
		
		this.#interval_timer = setInterval(
			() => { this.on_interval(); },
			this.#interval
		);
	}
	
	get interval() { return this.#interval; }
	
	/** Callbacks. */
	on_recv(args) {	 }
	on_interval(args) { this.send([]); }
	on_id_change(id) { this.send([]); }
}

function generic_create(parent, class_name)
{
	const g = document.createElement("div");
	g.className = class_name;
	parent.appendChild(g);
	
	g.ajax = new ajax();

	return g;
}

function layout_create(parent, direction)
{	
	const layout = generic_create(parent, "lay");
	layout.style.flexDirection = (direction == "h") ? "row" : "column";
	return layout;
}

function pane_create(parent, caption)
{	
	const pane = generic_create(parent, "pane");
	
	pane.caption = generic_create(pane, "pane_capt");
	pane.text = generic_create(pane.caption, "pane_text");
	pane.text.innerHTML = caption;
	pane.toolbar = generic_create(pane.caption, "pane_tool");
	
	pane.content = generic_create(pane, "pane_cont");
	
	return pane;
}

function subpane_create(parent, caption)
{
	const pane = pane_create(parent, caption);
	//pane.style.boxShadow = "none";
	pane.text.style.fontSize = "1em";
	return pane;
}

function popup_create(parent, caption) {
	const blur = generic_create(parent, "blur");
	const popup = pane_create(blur, caption);
	popup.classList.add("popup");
	
	blur.caption = popup.caption;
	blur.content = popup.content;
	
	return blur;
};

function text_create(parent, text)
{
	const e = generic_create(parent, "text");
	e.innerHTML = text;
	return e;
}

function button_create(parent, text)
{
	var button = generic_create(parent, "button");
	button.innerHTML = text;
	
	/** custom event. */
	button.on_press = function() {}
	
	/** Set ajax event for this checkbox. */
	button.onclick = function()
	{
		this.on_press();
		this.ajax.send([1]);
	}
		
	button.ajax.on_id_change = function(id) {};

	return button;
}

function checkbox_create(parent, state)
{
	const checkbox = generic_create(parent, "button");
	
	/** Change switcher internal state. */
	checkbox.set_state = function(state)
	{
		checkbox.state = state;
		
		if (state) {
			checkbox.style.background = "#113311";
			checkbox.innerHTML = "&#10003";
		} else {
			checkbox.style.background = "#331111";
			checkbox.innerHTML = "&#10007";
		}
	}
	
	checkbox.set_state(state);

	/** custom event. */
	checkbox.on_check = function(state) {}
	
	/** Set ajax event for this checkbox. */
	checkbox.onclick = function()
	{
		checkbox.set_state(!checkbox.state);
		checkbox.on_check(checkbox.state);
		checkbox.ajax.send([checkbox.state ? 1 : 0]);
	}
		
	checkbox.ajax.interval = 5000;
	checkbox.ajax.on_recv = function(args)
	{
		checkbox.set_state(args[0]);
		checkbox.on_check(args[0]);
	}
	
	return checkbox;
}

function field_create(parent, value)
{
	const field = document.createElement("input");
	field.className = "field";
	field.type = "text";
	field.value = value;
	parent.appendChild(field);
	return field;
}

function regulator_create(parent, rmin, rmax, rstep, orient)
{
	const digits = 2;
	const layout = layout_create(parent, "h");
	const decrement = button_create(layout, "<");
	const text = text_create(layout, "");
	const increment = button_create(layout, ">");
	
	layout.style.flexWrap = "nowrap";
	layout.style.flex = "1";
	layout.decrement = decrement;
	layout.text = text;
	layout.increment = increment;
	layout.format = "numeric";
	
	/** custom event. */
	decrement.on_press = function() {}
	increment.on_press = function() {}
	
	layout.check_bounds = function()
	{
		if (layout.value > rmax)
			layout.value = rmax;

		if (layout.value < rmin)
			layout.value = rmin;
	}
	
	layout.set_value = function(val) {
		layout.value = parseFloat(val);
		layout.check_bounds();
		if (layout.format == "percentage")
			layout.text.innerHTML = (layout.value * 100).toFixed(digits) + "%";
		else
			layout.text.innerHTML = layout.value.toFixed(digits);
	};
	
	layout.set_format = function(fmt) {
		layout.format = fmt;
		layout.set_value(layout.value);
	}
	
	/** Set click event for this checkbox. */
	decrement.onclick = function() {
		layout.set_value(layout.value - rstep);
		layout.ajax.send([layout.value.toFixed(digits)]);
		decrement.on_press();
	};
	
	text.onclick = function() {
		const popup = popup_create(document.body, "Input value");
		const field = field_create(popup.content, layout.value.toFixed(digits));
		field.type = "number";
		field.min = rmin;
		field.max = rmax;
		field.step = rstep;
	
		const button = button_create(popup.content, "Set");
		button.on_press = function() {
			layout.set_value(field.value);
			layout.ajax.send([layout.value.toFixed(digits)]);
			popup.remove();
		};
		
		field.onkeydown = function(evt) {
			if (evt.key === "Enter")
				button.on_press();
		}
	};
	
	increment.onclick = function() {
		layout.set_value(layout.value + rstep);
		layout.ajax.send([layout.value.toFixed(digits)]);
		increment.on_press();
	};
	
	increment.ontouchstart = increment.onmousedown = function() {
		/** TODO AUTOINCREMENT. */
		//console.log("touchstart");
	};
	
	layout.ajax.interval = 5000;
	layout.ajax.on_recv = function(args)
	{
		layout.set_value(args[0]);
	}
	
	layout.set_value(rmin);
	return layout;
}

function loading_create(parent)
{

}

function create_bms_regulator(parent, rmin, rmax, rstep,
			      enabler_id, regulator_value_id, caption)
{
	const subpane = subpane_create(parent, caption);
	subpane.content.style.flexBasis = "33.333333%";
	subpane.content.style.visibility = "hidden";
	subpane.toolbar.checkbox = checkbox_create(subpane.toolbar, false);
	subpane.toolbar.checkbox.style.padding = "0.1em";
	subpane.toolbar.checkbox.ajax.id = enabler_id;
	subpane.toolbar.checkbox.on_check = function(state)
	{
		if (state) {
			subpane.content.regulator.ajax.id = regulator_value_id;
			subpane.content.style.visibility = "";
		} else {
			subpane.content.regulator.ajax.id = undefined;
			subpane.content.style.visibility = "hidden";
		}
	}
	
	subpane.content.regulator = regulator_create(subpane.content, rmin, rmax, rstep);
	
	return subpane;
}

		pane.content.style.visibility = state ? "" : "hidden";
	}

	const confirm_button = button_create(subpane.toolbar, "Apply");
	confirm_button.style.padding = "0.1em";
	confirm_button.on_press = function() {
		//text.innerHTML = regulator.value.toFixed(2);
		text.ajax.send([regulator.value]);
	}
	
	/** Create regulator. */
